
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>
<link rel="stylesheet" href="style.css">
<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fecfef);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
width:360px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
z-index:10;
}

h1{
color:#ff4d6d;
}

#message{
font-size:16px;
color:#444;
min-height:60px;
}

button{
padding:12px 25px;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
margin:10px;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:#ccc;
position:absolute;
}

.cat{
width:120px;
margin-bottom:10px;
}

/* floating hearts */

.heart{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

</style>
</head>

<body>

<!-- romantic music -->
<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b7a4c8c2.mp3?filename=romantic-background-112191.mp3" type="audio/mp3">
</audio>

<div class="container">

<img class="cat" src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif">

<h1>I'm Really Sorry GUDU(MADAM JI) 😘💕</h1>

<p id="message"></p>

<button id="yes" onclick="forgive()">Yes, I forgive you ❤️</button>
<button id="no" onmouseover="moveBtn()">No 😾</button>

</div>

<script>

/* TYPEWRITER MESSAGE */

let text="I know I made a mistake and hurt you... but you mean everything to me. Please forgive me and give me one more chance 🥺❤️";

let i=0;

function typeWriter(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i);

i++;

setTimeout(typeWriter,50);

}

}

typeWriter();

/* RUNNING NO BUTTON */

function moveBtn(){

let btn=document.getElementById("no");

let x=Math.random()*(window.innerWidth-100);
let y=Math.random()*(window.innerHeight-50);

btn.style.left=x+"px";
btn.style.top=y+"px";

}

/* YES CLICK EFFECT */

function forgive(){ window.location.href="love.html"; 

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*30+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},4000);

}

alert("Yay!! Thank you for forgiving me ❤️🐱");

}

/* FLOATING HEARTS BACKGROUND */

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},500);

</script>

</body>
</html>
